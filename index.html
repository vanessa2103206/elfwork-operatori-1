<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selfwork Operatori 1</title>
</head>
<body>

    <h1>Esercizio Somma e Media in JavaScript</h1>
    <p>Fai click con il tasto destro sulla pagina, seleziona "Ispeziona" e vai sulla scheda "Console" per vedere il risultato finale!</p>

    <script>
        // 1. Dichiaro 5 variabili contenenti un numero ciascuna
        let num1 = 10;
        let num2 = 22;
        let num3 = 35;
        let num4 = 47;
        let num5 = 56;

        // 2. Calcolo la somma tra i 5 numeri
        let somma = num1 + num2 + num3 + num4 + num5;

        // 3. Calcolo la media (totale della somma diviso il numero delle variabili, cioè 5)
        let media = somma / 5;

        // 4. Mostro in console la frase esatta richiesta dalla traccia
        console.log("La somma tra i numeri equivale a " + somma + " e la media equivale a " + media);
    </script>
</body>
</html>
